services:
  bizsaathi:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      NEXT_PUBLIC_APP_NAME: BizSaathi
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://bizsaathi.example.com}
      DATABASE_URL: postgresql://${POSTGRES_USER:-bizsaathi}:${POSTGRES_PASSWORD:-change-me}@bizsaathi-postgres:5432/${POSTGRES_DB:-bizsaathi}?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-bizsaathi_session}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      PAPERCLIP_API_URL: ${PAPERCLIP_API_URL:-http://paperclip:3001}
      PAPERCLIP_API_KEY: ${PAPERCLIP_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      DEFAULT_MODEL_PROVIDER: ${DEFAULT_MODEL_PROVIDER:-ollama}
      DEFAULT_MODEL_NAME: ${DEFAULT_MODEL_NAME:-llama3.1:8b}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    expose:
      - "8080"
    depends_on:
      bizsaathi-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network
      - bizsaathi-private

  bizsaathi-postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bizsaathi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-bizsaathi}
    volumes:
      - bizsaathi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bizsaathi} -d ${POSTGRES_DB:-bizsaathi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bizsaathi-private

volumes:
  bizsaathi_postgres_data:

networks:
  dokploy-network:
    external: true
  bizsaathi-private:
    driver: bridge
