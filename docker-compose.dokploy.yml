services:
  bizsaathi:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_APP_NAME: BizSaathi
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://bizsaathi.example.com}
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-bizsaathi_session}
      PAPERCLIP_API_URL: ${PAPERCLIP_API_URL:-http://paperclip:3001}
      PAPERCLIP_API_KEY: ${PAPERCLIP_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      DEFAULT_MODEL_PROVIDER: ${DEFAULT_MODEL_PROVIDER:-ollama}
      DEFAULT_MODEL_NAME: ${DEFAULT_MODEL_NAME:-llama3.1:8b}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
